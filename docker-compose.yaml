services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://purerss.heiphaistos.org
    container_name: purerss_frontend
    restart: unless-stopped
    networks:
      - purerss-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: purerss_backend
    restart: unless-stopped
    environment:
      - PORT=3002
      - DB_PATH=/app/data/purerss.db
      - API_KEY=${API_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - purerss-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: purerss_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - purerss-network

networks:
  purerss-network:
    driver: bridge
    name: purerss-network
